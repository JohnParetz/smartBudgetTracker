<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Budget Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Smart Budget Tracker</h1>
    <p class="subtitle">Track your income and expenses easily</p>

    <div class="card">
      <h2>Add Entry</h2>

      <div class="tabs">
        <button class="tab-btn active" id="incomeTab" onclick="setType('income')">Income</button>
        <button class="tab-btn" id="expenseTab" onclick="setType('expense')">Expense</button>
      </div>

      <input type="text" id="desc" placeholder="Description">
      <input type="number" id="amount" placeholder="Amount">

      <button class="add-btn" onclick="addEntry()">Add</button>
    </div>

    <div class="summary">
      <div class="box income-box">
        <h3>Income</h3>
        <p id="income">$0</p>
      </div>

      <div class="box expense-box">
        <h3>Expenses</h3>
        <p id="expenses">$0</p>
      </div>

      <div class="box balance-box">
        <h3>Balance</h3>
        <p id="balance">$0</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
